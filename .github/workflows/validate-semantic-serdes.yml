name: validate-semantic-serdes

on:
  pull_request:
    paths:
      - "schemas/semantic-serdes/**"
      - "examples/semantic-serdes/**"
      - ".github/workflows/validate-semantic-serdes.yml"
  push:
    branches: [ main ]
    paths:
      - "schemas/semantic-serdes/**"
      - "examples/semantic-serdes/**"
      - ".github/workflows/validate-semantic-serdes.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      - name: Validate semantic-serdes examples
        run: |
          python tools/validate_semantic_serdes.py --schema-dir schemas/semantic-serdes             semantic_cell.schema.json:examples/semantic-serdes/asset_context_cell.example.yaml             semantic_cell.schema.json:examples/semantic-serdes/user_context_cell.example.yaml             semantic_cell.schema.json:examples/semantic-serdes/process_context_cell.example.yaml             semantic_cell.schema.json:examples/semantic-serdes/artifact_context_cell.example.yaml             semantic_cell.schema.json:examples/semantic-serdes/global_context_cell.example.yaml             tag_transition.schema.json:examples/semantic-serdes/tag_transition.example.yaml             surface_projection.schema.json:examples/semantic-serdes/surface_projection.example.yaml             context_merge_policy.schema.json:examples/semantic-serdes/context_merge_policy.example.yaml             agent_message.schema.json:examples/semantic-serdes/agent_message.example.yaml             agent_decision_artifact.schema.json:examples/semantic-serdes/agent_decision_artifact.example.yaml             replay_artifact.schema.json:examples/semantic-serdes/replay_artifact.example.yaml             alias_map.schema.json:examples/semantic-serdes/alias_map.example.yaml
